name: Run Gemini Proxy

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Install dependencies
        run: npm ci
        working-directory: ./proxy

      - name: Start proxy server with API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd proxy
          echo "🔑 Длина ключа в workflow: ${#GEMINI_API_KEY}"
          node server.js &
          sleep 5
          echo "✅ Прокси-сервер запущен"

      - name: Start tunnel and get URL
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:3001 > tunnel.log 2>&1 &
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          echo "url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Show connection info
        run: |
          echo "==========================================="
          echo "🌐 URL: ${{ steps.tunnel.outputs.url }}"
          echo "🔗 Health: ${{ steps.tunnel.outputs.url }}/health"
          echo "🤖 Gemini: ${{ steps.tunnel.outputs.url }}/api/gemini/generate"
          echo "==========================================="

      - name: Upload URL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: tunnel-url.txt

      - name: Keep alive
        run: |
          echo "🔄 Туннель активен: ${{ steps.tunnel.outputs.url }}"
          while true; do sleep 60; done