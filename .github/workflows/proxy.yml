name: Run Gemini Proxy with Auto Tunnel

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version
          
      - name: Install dependencies
        run: |
          cd proxy
          npm install
          
      - name: Start proxy server
        run: |
          cd proxy
          # Запускаем прокси в фоне
          node server.js &
          # Сохраняем PID процесса
          echo "PROXY_PID=$!" >> $GITHUB_ENV
          # Даем время на запуск
          sleep 5
          echo "✅ Прокси-сервер запущен на порту 3001"
          
      - name: Create tunnel with Cloudflare
        id: tunnel
        run: |
          # Запускаем cloudflared в фоне и сохраняем URL
          cloudflared tunnel --url http://localhost:3001 > cloudflared.log 2>&1 &
          sleep 15
          
          # Извлекаем URL из логов
          TUNNEL_URL=$(cat cloudflared.log | grep -o 'https://[^ ]*\.trycloudflare\.com' | head -1)
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Не удалось получить URL из логов:"
            cat cloudflared.log
            exit 1
          fi
          
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Туннель создан: $TUNNEL_URL"
          
      - name: Display tunnel URL
        run: |
          echo "==========================================="
          echo "🌐 ТУННЕЛЬ СОЗДАН!"
          echo "📡 URL: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔗 Health check: ${{ steps.tunnel.outputs.tunnel-url }}/health"
          echo "🤖 Gemini endpoint: ${{ steps.tunnel.outputs.tunnel-url }}/api/gemini/generate"
          echo "==========================================="
          
      - name: Send tunnel URL to proxy
        run: |
          # Отправляем URL прокси-серверу
          curl -X POST http://localhost:3001/tunnel-url \
            -H "Content-Type: application/json" \
            -d '{"url": "${{ steps.tunnel.outputs.tunnel-url }}"}'
          echo "✅ URL отправлен прокси"
          
      - name: Update client .env with tunnel URL
        run: |
          mkdir -p client
          echo "VITE_PROXY_URL=${{ steps.tunnel.outputs.tunnel-url }}" > client/.env
          echo "✅ .env файл обновлен:"
          cat client/.env
          
      - name: Save URL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: client/.env
          retention-days: 7
          
      - name: Keep tunnel alive
        run: |
          echo "🔄 Туннель активен. URL: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "📝 Нажмите Cancel чтобы остановить"
          while true; do
            sleep 60
          done
