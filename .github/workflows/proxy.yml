name: Run Gemini Proxy with Auto Tunnel

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd proxy
          npm install
          
      - name: Start proxy server
        id: proxy
        run: |
          cd proxy
          # Запускаем прокси в фоне
          node server.js &
          # Сохраняем PID процесса
          echo "PROXY_PID=$!" >> $GITHUB_ENV
          # Даем время на запуск
          sleep 5
          echo "✅ Прокси-сервер запущен на порту 3001"
          
      - name: Create tunnel with bore.pub
        id: tunnel
        run: |
          # Устанавливаем bore
          cargo install bore-cli
          
          # Запускаем туннель в фоне и сохраняем URL
          bore local 3001 --to bore.pub > bore.log 2>&1 &
          sleep 5
          
          # Извлекаем URL из логов
          TUNNEL_URL=$(cat bore.log | grep -o 'https://[^ ]*\.trycloudflare\.com\|http://[^ ]*\.bore\.pub' | head -1)
          
          # Сохраняем URL в выходную переменную
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Туннель создан: $TUNNEL_URL"
          
      - name: Display tunnel URL
        run: |
          echo "==========================================="
          echo "🌐 ТУННЕЛЬ СОЗДАН!"
          echo "📡 URL: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔗 Health check: ${{ steps.tunnel.outputs.tunnel-url }}/health"
          echo "🤖 Gemini endpoint: ${{ steps.tunnel.outputs.tunnel-url }}/api/gemini/generate"
          echo "==========================================="
          
      - name: Update client .env with tunnel URL
        run: |
          # Создаем папку client если её нет
          mkdir -p client
          
          # Записываем URL в .env файл
          echo "VITE_PROXY_URL=${{ steps.tunnel.outputs.tunnel-url }}" > client/.env
          
          # Показываем результат
          echo "✅ .env файл обновлен:"
          cat client/.env
          
      - name: Save URL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: client/.env
          retention-days: 7
          
      - name: Keep tunnel alive
        run: |
          echo "🔄 Туннель активен. Нажмите Cancel чтобы остановить"
          echo "📝 URL сохранен в client/.env и в артефактах"
          while true; do
            sleep 60
          done
