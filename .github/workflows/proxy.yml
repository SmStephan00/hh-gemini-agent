name: Run Gemini Proxy with Auto Tunnel

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version
          
      - name: Install dependencies
        run: |
          cd proxy
          npm install
          
      - name: Start proxy server
        run: |
          cd proxy
          node server.js &
          sleep 5
          echo "✅ Прокси-сервер запущен"
          
      - name: Create tunnel with Cloudflare
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:3001 > cloudflared.log 2>&1 &
          sleep 15
          TUNNEL_URL=$(cat cloudflared.log | grep -o 'https://[^ ]*\.trycloudflare\.com' | head -1)
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Не удалось получить URL"
            exit 1
          fi
          
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Туннель создан: $TUNNEL_URL"
          
      - name: Send URL to proxy
        run: |
          curl -X POST http://localhost:3001/tunnel-url \
            -H "Content-Type: application/json" \
            -d '{"url": "${{ steps.tunnel.outputs.tunnel-url }}"}'
          
      - name: Update client .env
        run: |
          mkdir -p client
          echo "VITE_PROXY_URL=${{ steps.tunnel.outputs.tunnel-url }}" > client/.env
          echo "✅ .env обновлен: ${{ steps.tunnel.outputs.tunnel-url }}"
          
      - name: Commit and push updated .env
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add client/.env
          git commit -m "Auto-update tunnel URL: ${{ steps.tunnel.outputs.tunnel-url }}" || echo "No changes to commit"
          git push
          
      - name: Save URL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: client/.env
          retention-days: 7
          
      - name: Keep tunnel alive
        run: |
          echo "🔄 Туннель активен. URL автоматически сохранен в client/.env и закоммичен в репозиторий"
          while true; do
            sleep 60
          done
