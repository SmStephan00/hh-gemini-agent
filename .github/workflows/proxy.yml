name: Run Gemini Proxy with TryCloudflare

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version
          
      - name: Install dependencies
        run: |
          cd proxy
          npm install
          
      - name: Start proxy with TryCloudflare
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd proxy
          echo ""
          echo "==========================================="
          echo "🚀 Запуск прокси с TryCloudflare"
          echo "==========================================="
          
          # Запускаем прокси в фоне
          node server.js &
          
          # Даём время на запуск
          sleep 5
          
          # Проверяем, что прокси работает локально
          echo "🔄 Проверка локального прокси..."
          curl -f http://localhost:3001/health || (echo "❌ Прокси не запущен!" && exit 1)
          echo "✅ Прокси работает локально"
          
          echo ""
          echo "🔄 Запуск TryCloudflare Tunnel..."
          echo "URL будет показан ниже:"
          echo ""
          
          # Запускаем Quick Tunnel (без токена, без аккаунта)
          cloudflared tunnel --url http://localhost:3001
