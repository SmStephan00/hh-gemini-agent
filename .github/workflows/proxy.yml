name: Run Gemini Proxy with Auto Tunnel

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd proxy
          npm install
          
      - name: Start proxy server
        id: proxy
        run: |
          cd proxy
          node server.js &
          echo "PROXY_PID=$!" >> $GITHUB_ENV
          sleep 5
          
      - name: Create tunnel with Expose Tunnel
        id: tunnel
        uses: codetalkio/expose-tunnel@v1.5.0
        with:
          service: bore.pub
          port: 3001
          
      - name: Display tunnel URL
        run: |
          echo "==========================================="
          echo "🌐 Туннель создан!"
          echo "📡 URL: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔗 Health check: ${{ steps.tunnel.outputs.tunnel-url }}/health"
          echo "🤖 Gemini endpoint: ${{ steps.tunnel.outputs.tunnel-url }}/api/gemini/generate"
          echo "==========================================="
          
          # Сохраняем URL в файл для следующего шага
          echo "${{ steps.tunnel.outputs.tunnel-url }}" > tunnel-url.txt
          
      - name: Save URL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: tunnel-url.txt
          retention-days: 1
          
      - name: Keep alive
        run: |
          echo "🔄 Туннель активен. Нажмите Cancel чтобы остановить"
          while true; do
            sleep 60
          done
